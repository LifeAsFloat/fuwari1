name: Auto Merge Friends PR

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Besty0728'
    steps:
      - name: Checkout Base (safe context)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Verify Changed Files
        id: verify
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if [ -z "$CHANGED_FILES" ]; then
            echo "::error::No files changed."
            exit 1
          fi

          for file in $CHANGED_FILES; do
            if [[ "$file" == "src/content/friends/_order.json" ]]; then
              echo "::error::Modifying _order.json is not allowed."
              exit 1
            fi
            if [[ ! "$file" =~ ^src/content/friends/[a-zA-Z0-9_-]+\.json$ ]]; then
              echo "::error::File $file is not allowed. Only src/content/friends/<name>.json is permitted."
              exit 1
            fi
          done

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "✅ File path check passed."

      - name: Checkout PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate JSON Content
        shell: bash
        run: |
          cat > /tmp/validate_friend.py << 'PYEOF'
          import json, sys, re
          with open(sys.argv[1]) as f:
              data = json.load(f)
          required = ["name", "url", "avatar", "introduction", "friendsPage"]
          for field in required:
              if field not in data or not isinstance(data[field], str) or not data[field].strip():
                  print(f"::error::Missing or empty required field: {field}")
                  sys.exit(1)
          for url_field in ["url", "avatar", "friendsPage"]:
              if not re.match(r"^https?://", data[url_field]):
                  print(f"::error::{url_field} must start with http:// or https://")
                  sys.exit(1)
          for key, val in data.items():
              if not isinstance(val, str):
                  print(f"::error::Field {key} must be a string.")
                  sys.exit(1)
              if re.search(r"<script|javascript:|on\w+=", val, re.IGNORECASE):
                  print(f"::error::Field {key} contains suspicious content.")
                  sys.exit(1)
          allowed = {"name", "url", "avatar", "introduction", "friendsPage"}
          extra = set(data.keys()) - allowed
          if extra:
              print(f"::error::Unknown fields: {extra}")
              sys.exit(1)
          print(f"Validated: {sys.argv[1]}")
          PYEOF

          FILES="${{ steps.verify.outputs.files }}"
          for file in $FILES; do
            if [ ! -f "$file" ]; then
              echo "::error::File $file not found (deleted?)."
              exit 1
            fi
            SIZE=$(stat -c%s "$file")
            if [ "$SIZE" -gt 2048 ]; then
              echo "::error::$file exceeds 2KB size limit."
              exit 1
            fi
            python3 /tmp/validate_friend.py "$file"
          done

      - name: Check Backlink
        id: backlink
        shell: bash
        run: |
          RESULT=""
          ALL_PASS=true
          FILES="${{ steps.verify.outputs.files }}"
          for file in $FILES; do
            FRIENDS_PAGE=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['friendsPage'])" "$file")
            NAME=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1]))['name'])" "$file")
            HTTP_CODE=$(curl -s -o /tmp/page.html -w "%{http_code}" -L --max-time 15 "$FRIENDS_PAGE" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              if grep -qi 'href="[^"]*www\.micostar\.cc[^"]*"' /tmp/page.html; then
                RESULT="${RESULT}${NAME}: ✅ 已添加互链\n"
              else
                RESULT="${RESULT}${NAME}: ❌ 未检测到 www.micostar.cc 的链接\n"
                ALL_PASS=false
              fi
            else
              RESULT="${RESULT}${NAME}: ⚠️ 无法访问友链页面 (HTTP ${HTTP_CODE})\n"
              ALL_PASS=false
            fi
          done
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo -e "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ "$ALL_PASS" = "false" ]; then
            echo "::error::Backlink check failed."
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Check
        run: pnpm build

      - name: Auto Merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --subject "🤝 友链申请：欢迎 ${{ github.event.pull_request.user.login }}" \
            --body "友链机器人自动验证通过 ✅"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Order
        shell: bash
        run: |
          git checkout main
          git pull origin main

          cat > /tmp/update_order.py << 'PYEOF'
          import json, sys
          order_file = "src/content/friends/_order.json"
          with open(order_file) as f:
              order = json.load(f)
          name = sys.argv[1]
          if name not in order:
              order.append(name)
              with open(order_file, "w") as f:
                  json.dump(order, f, indent=2, ensure_ascii=False)
                  f.write("\n")
              print(f"Added {name} to _order.json")
          else:
              print(f"{name} already in _order.json")
          PYEOF

          FILES="${{ steps.verify.outputs.files }}"
          for file in $FILES; do
            ID=$(basename "$file" .json)
            python3 /tmp/update_order.py "$ID"
          done
          if git diff --quiet; then
            echo "No order changes needed."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/content/friends/_order.json
            git commit -m "chore: update friends order"
            git push origin main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: always()
        shell: bash
        run: |
          BACKLINK_RESULT="${{ steps.backlink.outputs.result }}"
          if [ "${{ job.status }}" = "success" ]; then
            BODY="🎉 友链已自动合并，欢迎加入！你的链接将在站点下次部署后生效。

          **互链检测结果：**
          ${BACKLINK_RESULT}"
          else
            BODY="❌ 自动验证未通过，请检查：
          - JSON 格式是否正确
          - 必需字段：name、url、avatar、introduction、friendsPage
          - url、avatar、friendsPage 必须以 http(s):// 开头
          - 只允许修改 src/content/friends/ 下的 JSON 文件
          - 文件名只能包含字母、数字、下划线和连字符
          - 对方友链页面必须包含指向 www.micostar.cc 的链接

          **互链检测结果：**
          ${BACKLINK_RESULT}

          详情请查看 [Action 日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})。"
          fi
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
